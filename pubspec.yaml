name: royalcakes
description: "Learn the art of baking with RoyalCakes. From simple cakes to advanced desserts, follow step-by-step courses and turn your passion for baking into professional skills."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  dio: ^5.4.3
  cached_network_image: ^3.3.1
  smooth_page_indicator: ^1.1.0
  shared_preferences: ^2.5.3
  video_player: ^2.10.1
  chewie: ^1.13.1
  screen_protector: ^1.5.2
  web_socket_channel: ^3.0.3
  intl: ^0.20.2
  file_picker: ^11.0.2
  image_picker: ^1.2.1
  url_launcher: ^6.3.2


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/cake/             # برای عکس‌های دوره کیک
    - assets/images/sweet/            # برای عکس‌های دوره شیرینی
    - assets/images/cheesecake/       # برای عکس‌های دوره چیزکیک


fonts:
  - family: Samim
    fonts:
      - asset: fonts/Samim-Bold.ttf
        weight: 700